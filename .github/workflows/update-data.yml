name: Update static data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -e .

      - name: Export static ISP snapshot
        working-directory: backend
        run: python -m app.etl.export_static_frontend

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate frontend build
        working-directory: frontend
        run: npm run build

      - name: Commit updated snapshot
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- frontend/lib/static-data.generated.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add frontend/lib/static-data.generated.json
          git commit -m "Update static ISP snapshot"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Vercel
        if: steps.commit.outputs.changed == 'true'
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Vercel secrets not configured; skipping deploy."
            exit 0
          fi
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json
          npx vercel deploy --prod --yes --token "$VERCEL_TOKEN"
